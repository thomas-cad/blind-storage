services:
  postgres:
    image: postgres:18
    container_name: blind-storage-postgres-db
    restart: always
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - blind-storage-postgres-data:/var/lib/postgresql
volumes:
  blind-storage-postgres-data:

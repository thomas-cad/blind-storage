<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blind Storage - Secure Encryption & Upload</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .main-wrapper {
      display: flex;
      gap: 30px;
      max-width: 1100px;
      width: 100%;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      flex: 1;
      min-width: 0;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      color: #333;
      font-size: 28px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #333;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .file-input-wrapper {
      position: relative;
      overflow: hidden;
    }

    .file-input-wrapper input[type="file"] {
      display: none;
    }

    .file-label {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      border: 2px dashed #667eea;
      border-radius: 10px;
      cursor: pointer;
      background: #f8f9ff;
      transition: all 0.3s ease;
      font-weight: 500;
      color: #667eea;
    }

    .file-label:hover {
      background: #f0f1ff;
      border-color: #764ba2;
      color: #764ba2;
    }

    .file-label.has-file {
      border-color: #4caf50;
      background: #f1f8f4;
      color: #4caf50;
    }

    .file-name {
      font-size: 12px;
      color: #666;
      margin-top: 5px;
      padding: 5px 10px;
      background: #f5f5f5;
      border-radius: 5px;
      word-break: break-all;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin: 25px 0;
    }

    button {
      flex: 1;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-encrypt {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-encrypt:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .btn-upload {
      background: #4caf50;
      color: white;
    }

    .btn-upload:hover {
      background: #45a049;
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(76, 175, 80, 0.4);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .key-section {
      margin-top: 25px;
    }

    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      resize: vertical;
      min-height: 80px;
      max-height: 150px;
      background: #f8f9fa;
      color: #333;
      transition: border-color 0.3s ease;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    textarea:disabled {
      background: #f0f0f0;
      cursor: not-allowed;
    }

    .status {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
      padding: 10px;
      border-radius: 8px;
      display: none;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
      display: block;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }

    .copy-btn {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
      background: #2196F3;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .copy-btn:hover {
      background: #1976D2;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(33, 150, 243, 0.3);
    }

    .info-text {
      font-size: 12px;
      color: #999;
      margin-top: 8px;
      text-align: center;
    }

    .file-item {
      padding: 12px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s ease;
      border: 2px solid transparent;
    }

    .file-item.selected {
      background: #e8f5e9;
      border-color: #4caf50;
      box-shadow: 0 4px 12px rgba(76, 175, 80, 0.2);
    }

    @media (max-width: 900px) {
      .main-wrapper {
        flex-direction: column;
        gap: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="main-wrapper">
    <div class="container">
    <div class="header">
      <h1>🔐 Blind Storage</h1>
      <p>Encrypt and securely upload your files</p>
    </div>

    <div class="form-group">
      <label>Select File to Encrypt</label>
      <div class="file-input-wrapper">
        <input type="file" id="f">
        <label for="f" class="file-label" id="fileLabel">
          📁 Click to select file
        </label>
      </div>
      <div class="file-name" id="fileName" style="display: none;"></div>
    </div>

    <div class="button-group">
      <button class="btn-encrypt" onclick="enc()">🔒 Encrypt</button>
      <button class="btn-upload" onclick="up()" disabled id="uploadBtn">📤 Upload</button>
    </div>

    <div class="key-section">
      <label>Encryption Key (Base64)</label>
      <textarea id="key" disabled placeholder="Your encryption key will appear here after encryption..."></textarea>
      <button class="copy-btn" onclick="copyKey()" id="copyBtn" style="display: none;">📋 Copy Key</button>
      <p class="info-text">💡 Save this key safely to decrypt your files later</p>
    </div>

    <div class="status" id="status"></div>
    </div>

    <div class="container">
    <div class="header">
      <h1>📂 Fichiers Uploadés</h1>
      <p>Téléchargez et décryptez vos fichiers</p>
    </div>

    <div id="filesList">
      <p style="text-align: center; color: #999;">Chargement des fichiers...</p>
    </div>

    <div class="key-section" id="decryptSection" style="display: none; margin-top: 20px; border-top: 2px solid #e0e0e0; padding-top: 20px;">
      <label>Clé de Décryption (Base64)</label>
      <textarea id="decryptKey" placeholder="Collez votre clé de décryption ici..."></textarea>
      <button class="btn-encrypt" onclick="decryptSelectedFile()" style="width: 100%; margin-top: 15px;">🔓 Décrypter</button>
    </div>
    </div>
  </div>

  <script>
    let blob = null;
    let selectedFile = null;

    document.getElementById('f').addEventListener('change', function(e) {
      const fileName = e.target.files[0]?.name || '';
      const fileNameDiv = document.getElementById('fileName');
      const fileLabel = document.getElementById('fileLabel');
      
      if (fileName) {
        fileNameDiv.textContent = '✓ ' + fileName;
        fileNameDiv.style.display = 'block';
        fileLabel.classList.add('has-file');
      } else {
        fileNameDiv.style.display = 'none';
        fileLabel.classList.remove('has-file');
      }
    });

    async function enc() {
      try {
        const file = document.getElementById('f').files[0];
        if (!file) {
          showStatus('Please select a file', 'error');
          return;
        }

        const buf = await file.arrayBuffer();
        const key = await crypto.subtle.generateKey(
          { name: 'AES-GCM', length: 256 },
          true,
          ['encrypt', 'decrypt']
        );
        const raw = await crypto.subtle.exportKey('raw', key);
        const keyString = btoa(String.fromCharCode(...new Uint8Array(raw)));
        
        document.getElementById('key').value = keyString;
        document.getElementById('copyBtn').style.display = 'block';

        const iv = crypto.getRandomValues(new Uint8Array(12));
        const enc = await crypto.subtle.encrypt(
          { name: 'AES-GCM', iv },
          key,
          buf
        );
        
        blob = new Blob([JSON.stringify({
          iv: Array.from(iv),
          data: Array.from(new Uint8Array(enc)),
          originalName: file.name,
          mimeType: file.type || 'application/octet-stream'
        })]);

        document.getElementById('uploadBtn').disabled = false;
        showStatus('✓ File encrypted successfully', 'success');
      } catch (error) {
        showStatus('Encryption failed: ' + error.message, 'error');
      }
    }

    async function up() {
      try {
        if (!blob) {
          showStatus('Please encrypt a file first', 'error');
          return;
        }

        const fd = new FormData();
        fd.append('file', blob, 'file.json');
        
        const response = await fetch('/upload', {
          method: 'POST',
          body: fd
        });

        if (response.ok) {
          showStatus('✓ File uploaded successfully', 'success');
          setTimeout(() => {
            document.getElementById('f').value = '';
            document.getElementById('key').value = '';
            document.getElementById('fileName').style.display = 'none';
            document.getElementById('fileLabel').classList.remove('has-file');
            document.getElementById('uploadBtn').disabled = true;
            document.getElementById('copyBtn').style.display = 'none';
          }, 2000);
        } else {
          showStatus('Upload failed', 'error');
        }
      } catch (error) {
        showStatus('Upload error: ' + error.message, 'error');
      }
    }

    function copyKey() {
      const keyText = document.getElementById('key').value;
      if (!keyText) return;

      navigator.clipboard.writeText(keyText).then(() => {
        showStatus('✓ Key copied to clipboard', 'success');
      }).catch(() => {
        showStatus('Failed to copy key', 'error');
      });
    }

    function showStatus(message, type) {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = 'status ' + type;
      
      if (type === 'success') {
        setTimeout(() => {
          status.style.display = 'none';
        }, 3000);
      }
    }

    // Load files list
    async function loadFiles() {
      try {
        const response = await fetch('/files');
        const files = await response.json();
        
        const filesList = document.getElementById('filesList');
        
        if (!Array.isArray(files) || files.length === 0) {
          filesList.innerHTML = '<p style="text-align: center; color: #999;">Aucun fichier uploadé</p>';
          document.getElementById('decryptSection').style.display = 'none';
          return;
        }

        filesList.innerHTML = files.map(file => `
          <div class="file-item ${selectedFile === file ? 'selected' : ''}">
            <div>
              <p style="font-weight: 600; color: #333; margin-bottom: 4px;">📄 ${file}</p>
              <p style="font-size: 12px; color: #999;">${selectedFile === file ? '✓ Fichier sélectionné' : 'Cliquez pour sélectionner'}</p>
            </div>
            <div style="display: flex; gap: 8px;">
              <button onclick="selectFile('${file}')" style="padding: 8px 16px; background: ${selectedFile === file ? '#4caf50' : '#667eea'}; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600;">${selectedFile === file ? '✓ Sélectionné' : 'Sélectionner'}</button>
              <button onclick="deleteFile('${file}')" style="padding: 8px 16px; background: #f44; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600;">🗑️ Supprimer</button>
            </div>
          </div>
        `).join('');

        document.getElementById('decryptSection').style.display = 'block';
      } catch (error) {
        document.getElementById('filesList').innerHTML = '<p style="text-align: center; color: #f44; font-weight: 600;">Erreur lors du chargement des fichiers</p>';
      }
    }

    function selectFile(fileName) {
      selectedFile = fileName;
      document.getElementById('decryptKey').focus();
      loadFiles();
      showStatus(`✓ Fichier sélectionné: ${fileName}`, 'success');
    }

    async function decryptSelectedFile() {
      try {
        if (!selectedFile) {
          showStatus('Veuillez sélectionner un fichier', 'error');
          return;
        }

        const key = document.getElementById('decryptKey').value.trim();
        if (!key) {
          showStatus('Veuillez entrer votre clé de décryption', 'error');
          return;
        }

        // Download encrypted file
        const response = await fetch(`/files/${selectedFile}`);
        const encryptedData = await response.json();

        // Import key
        const rawKey = Uint8Array.from(atob(key), c => c.charCodeAt(0));
        const importedKey = await crypto.subtle.importKey(
          'raw',
          rawKey,
          { name: 'AES-GCM' },
          false,
          ['decrypt']
        );

        // Decrypt
        const iv = new Uint8Array(encryptedData.iv);
        const data = new Uint8Array(encryptedData.data);
        
        const decrypted = await crypto.subtle.decrypt(
          { name: 'AES-GCM', iv },
          importedKey,
          data
        );

        // Download with original name and type
        const originalName = encryptedData.originalName || 'downloaded-file';
        const mimeType = encryptedData.mimeType || 'application/octet-stream';
        
        const blob = new Blob([decrypted], { type: mimeType });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = originalName;
        a.click();
        URL.revokeObjectURL(url);

        showStatus('✓ Fichier décrypté et téléchargé', 'success');
      } catch (error) {
        // Check if it's a bad key error
        if (error.name === 'OperationError' || error.message.includes('decrypt')) {
          showStatus('❌ La clé de décryption est incorrecte. Vérifiez que vous avez copié la bonne clé.', 'error');
        } else if (error instanceof TypeError) {
          showStatus('❌ Erreur de clé: format invalide. Assurez-vous que la clé est en Base64.', 'error');
        } else {
          showStatus('❌ Erreur de décryption: ' + error.message, 'error');
        }
      }
    }

    async function deleteFile(fileName) {
      if (!confirm(`Êtes-vous sûr de vouloir supprimer "${fileName}" ?`)) {
        return;
      }

      try {
        const response = await fetch(`/files/${fileName}`, {
          method: 'DELETE'
        });

        if (response.ok) {
          showStatus('✓ Fichier supprimé avec succès', 'success');
          loadFiles();
        } else {
          showStatus('Erreur lors de la suppression du fichier', 'error');
        }
      } catch (error) {
        showStatus('Erreur: ' + error.message, 'error');
      }
    }

    // Load files on page load
    loadFiles();
    
    // Refresh files list every 5 seconds
    setInterval(loadFiles, 5000);
  </script>
</body>
</html>
